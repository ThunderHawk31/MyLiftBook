function ld(k,fb){try{const v=localStorage.getItem('gym_'+k);return v?JSON.parse(v):fb}catch(e){return fb}}
function sv(k,v){try{localStorage.setItem('gym_'+k,JSON.stringify(v))}catch(e){}}

// Edit state (not persisted — resets on page load)
let editMode=false;
let pendingDel=new Set();   // item IDs to delete
let pendingAdd=[];          // [{sk, gi, item}]

function uid(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function cancelEdit(){editMode=false;pendingDel.clear();pendingAdd=[];render();}

function applyEdit(){
  // Save names+color of exercises being deleted (for journal persistence)
  Object.keys(sessions).forEach(sk=>{
    sessions[sk].groups.forEach(g=>{
      g.items.filter(i=>pendingDel.has(i.id)).forEach(i=>{
        state.exoNames[i.id]={name:i.name,color:sessions[sk].color};
      });
    });
  });
  sv('exoNames',state.exoNames);
  // Apply deletions
  Object.keys(sessions).forEach(sk=>{
    sessions[sk].groups.forEach(g=>{
      g.items=g.items.filter(i=>!pendingDel.has(i.id));
    });
    sessions[sk].groups=sessions[sk].groups.filter(g=>g.items.length>0);
  });
  // Apply additions
  pendingAdd.forEach(pa=>{
    if(sessions[pa.sk]&&sessions[pa.sk].groups[pa.gi]){
      sessions[pa.sk].groups[pa.gi].items.push(pa.item);
    }
  });
  sv('sessions',sessions);
  editMode=false;pendingDel.clear();pendingAdd=[];
  render();
}

// ═══ DOM ═══
function h(tag,a,...ch){
  const el=document.createElement(tag);
  if(a)Object.entries(a).forEach(([k,v])=>{
    if(k==='cls')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='css'&&typeof v==='object')Object.assign(el.style,v);else el.setAttribute(k,v);
  });
  ch.flat(9).forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
}
function t(s){return document.createTextNode(s)}

function openModal(fn){
  const ov=h('div',{cls:'modal-overlay',onClick:()=>ov.remove()});
  const m=h('div',{cls:'modal',onClick:e=>e.stopPropagation()});
  fn(m,()=>ov.remove());ov.append(m);document.body.append(ov);return ov;
}

function showWeightModal(item,color){
  let val=item.weight;
  openModal((m,close)=>{
    const inp=h('input',{type:'number',inputMode:'decimal',value:String(val),cls:'modal-input mono',css:{color,borderColor:color+'40'}});
    inp.addEventListener('input',()=>{val=parseFloat(inp.value)||0});
    m.style.border='1px solid '+color+'30';
    m.append(
      h('h3',{cls:'syne',css:{color:'#F0EDE6'}},item.name),
      h('p',{cls:'modal-desc'},'Modifier la charge'),
      h('div',{cls:'modal-input-row'},
        h('button',{cls:'modal-btn-pm',onClick:()=>{val=Math.max(0,val-2.5);inp.value=String(val)}},'−'),inp,
        h('button',{cls:'modal-btn-pm',onClick:()=>{val+=2.5;inp.value=String(val)}},'+')
      ),
      h('div',{cls:'ma'},
        h('button',{css:{flex:'1',padding:'12px',borderRadius:'10px',border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'rgba(255,255,255,.5)'},onClick:close},'Annuler'),
        h('button',{css:{flex:'1',padding:'12px',borderRadius:'10px',border:'none',background:color,color:'#0A0A0A',fontWeight:'700'},onClick:()=>{
          const old=item.weight,nw=parseFloat(inp.value)||0;
          if(old!==nw){const d=new Date(),ds=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
            if(!state.logs[item.id])state.logs[item.id]=[];
            state.logs[item.id].push({date:ds,from:old,to:nw});sv('logs',state.logs);
            state.exoNames[item.id]={name:item.name,color};sv('exoNames',state.exoNames);
          }
          item.weight=nw;sv('sessions',sessions);close();render();
        }},'Valider')
      )
    );
    setTimeout(()=>{inp.focus();inp.select()},100);
  });
}

    const uS=h('select',null,h('option',{value:'pdc'},'Poids du corps'),h('option',{value:'kg'},'kg'),h('option',{value:''},'Aucun'));
    uS.addEventListener('change',()=>{unit=uS.value});
    const rI=h('input',{type:'text',value:rest});rI.addEventListener('input',()=>{rest=rI.value});
    const noI=h('textarea',{placeholder:"Notes (optionnel)"});noI.addEventListener('input',()=>{note=noI.value});

    const sugDiv=h('div',null,h('label',{css:{display:'block',fontSize:'11px',color:'rgba(255,255,255,.4)',marginBottom:'8px',letterSpacing:'.5px',textTransform:'uppercase'}},'Suggestions'));
    const cw=h('div',{cls:'suggest-list'});
    Object.values(SUGGEST).flat().forEach(ex=>{
      cw.append(h('span',{cls:'suggest-chip',onClick:()=>{nI.value=ex.n;name=ex.n;sI.value=ex.s;sets=ex.s}},ex.n));
    });
    sugDiv.append(cw);

    m.append(
      h('h3',{cls:'syne',css:{color:'#F0EDE6'}},'Ajouter un exercice'),
      h('p',{cls:'modal-desc'},'Clique une suggestion ou remplis manuellement'),
      sugDiv,
      h('div',{cls:'mf'},h('label',null,'Nom'),nI),
      h('div',{cls:'mf'},h('label',null,'Séries × Reps'),sI),
      h('div',{cls:'mf-row'},h('div',{cls:'mf'},h('label',null,'Charge'),wI),h('div',{cls:'mf'},h('label',null,'Unité'),uS)),
      h('div',{cls:'mf'},h('label',null,'Repos'),rI),
      h('div',{cls:'mf'},h('label',null,'Notes'),noI),
      h('div',{cls:'ma'},
        h('button',{css:{flex:'1',padding:'12px',borderRadius:'10px',border:'1px solid rgba(255,255,255,.1)',background:'transparent',color:'rgba(255,255,255,.5)'},onClick:close},'Annuler'),
        h('button',{css:{flex:'1',padding:'12px',borderRadius:'10px',border:'none',background:color,color:'#0A0A0A',fontWeight:'700'},onClick:()=>{
          if(!name.trim()){nI.style.borderColor='#FF6B6B';return;}
          pendingAdd.push({sk,gi,item:{id:uid(),name:name.trim(),sets,weight,unit,rest,note}});
          close();render();
        }},'Ajouter')
      )
    );
    setTimeout(()=>nI.focus(),100);
  });
}

// ═══ RENDER ═══
function render(){
  if(!profile){renderOnboard();return;}
  const ac=state.tab==='log'?'#FFD166':state.tab==='tips'?'#F0EDE6':sessions[state.tab]?.color||'#F0EDE6';
  app.innerHTML='';

  // Profile
  app.append(h('div',{cls:'profile-bar'},
    h('span',{cls:'profile-name mono'},'👤 '+profile.name),
    h('button',{cls:'profile-btn',onClick:()=>{
      if(confirm('Changer de profil ?')){profile=null;sv('profile',null);renderOnboard();}
    }},'Changer')
  ));

  app.append(
    h('div',{cls:'mono header-label'},'Programme Musculation — 3×/semaine'),
    h('h1',{cls:'syne header-title',css:{background:'linear-gradient(135deg,#F0EDE6 30%,'+ac+')',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'SPLIT A / B / C'),
    h('p',{cls:'header-sub'},'✓ cocher · ✏️ modifier · ＋ ajouter')
  );

  // Week
  const wk=h('div',{cls:'week'});
  WEEK.forEach(d=>wk.append(h('div',{cls:'week-day'},h('div',{cls:'mono week-day-label'},d.day.slice(0,3).toUpperCase()),h('div',{cls:'syne week-day-bubble',css:{background:d.c?d.c+'20':'transparent',color:d.c||'rgba(255,255,255,.12)',border:d.c?'1.5px solid '+d.c+'40':'1.5px solid rgba(255,255,255,.06)'}},d.s))));
  app.append(wk);

  // Tabs
  const tabs=h('div',{cls:'tabs'});
  [{id:'A',l:'A',f:'Poussée',c:'#FF6B35'},{id:'B',l:'B',f:'Tirage',c:'#00D4AA'},{id:'C',l:'C',f:'Tractions',c:'#A855F7'},{id:'log',l:'📊',f:'Journal',c:'#FFD166'},{id:'tips',l:'?',f:'Conseils',c:'#F0EDE6'}].forEach(tb=>{
    const act=state.tab===tb.id;
    tabs.append(h('button',{cls:'tab'+(act?' active':''),css:{background:act?tb.c+'20':'transparent',color:act?tb.c:'rgba(255,255,255,.25)',boxShadow:act?'inset 0 0 0 1px '+tb.c+'35':'none'},onClick:()=>{
      if(editMode&&(pendingDel.size||pendingAdd.length)){if(!confirm('Quitter sans valider ? Les modifications seront annulées.')){return;} cancelEdit();}
      state.tab=tb.id;sv('tab',tb.id);render();
    }},h('span',{cls:'tab-label'},tb.l),h('span',{cls:'tab-sub'},tb.f)));
  });
  app.append(tabs);

  // Edit banner
  if(editMode&&sessions[state.tab]){
    const nDel=pendingDel.size,nAdd=pendingAdd.filter(p=>p.sk===state.tab).length;
    const hasPending=nDel>0||nAdd>0;
    const banner=h('div',{cls:'edit-banner',css:{background:hasPending?'rgba(255,209,102,.1)':'rgba(255,255,255,.04)',border:hasPending?'1px solid rgba(255,209,102,.25)':'1px solid rgba(255,255,255,.08)'}});
    const info=h('p',{css:{color:hasPending?'#FFD166':'rgba(255,255,255,.4)'}});
    if(hasPending){
      if(nDel)info.append(h('span',{cls:'pending-badge mono',css:{background:'rgba(255,80,80,.12)',color:'#FF6B6B'}},nDel+' suppression'+(nDel>1?'s':'')));
      if(nAdd)info.append(h('span',{cls:'pending-badge mono',css:{background:'rgba(0,212,170,.12)',color:'#00D4AA'}},nAdd+' ajout'+(nAdd>1?'s':'')));
      info.append(t(' en attente'));
    }else{
      info.append(t('✏️ Clique × pour marquer, ＋ pour ajouter'));
    }
    banner.append(info);
    const acts=h('div',{cls:'edit-actions'});
    acts.append(h('button',{css:{background:'rgba(255,255,255,.06)',color:'rgba(255,255,255,.4)',border:'1px solid rgba(255,255,255,.08)'},onClick:cancelEdit},'Annuler'));
    if(hasPending){
      acts.append(h('button',{css:{background:'#00D4AA',color:'#0A0A0A'},onClick:applyEdit},'✓ Valider'));
    }else{
      acts.append(h('button',{css:{background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.3)',border:'1px solid rgba(255,255,255,.06)'},onClick:cancelEdit},'Terminé'));
    }
    banner.append(acts);
    app.append(banner);
  }

  if(sessions[state.tab])renderSession(state.tab);
  else if(state.tab==='log')renderLog();
  else if(state.tab==='tips')renderTips();

  app.append(h('div',{css:{borderTop:'1px solid rgba(255,255,255,.04)',paddingTop:'16px',textAlign:'center',marginTop:'24px'}},
    h('span',{cls:'mono',css:{fontSize:'10px',color:'rgba(255,255,255,.12)',letterSpacing:'1.5px'}},profile.name.toUpperCase()+' — 2026')
  ));
}

function renderOnboard(){
  app.innerHTML='';
  const inp=h('input',{type:'text',placeholder:'Ton prénom',maxlength:'20'});
  app.append(h('div',{cls:'onboard'},
    h('h1',{cls:'syne',css:{background:'linear-gradient(135deg,#F0EDE6,#FF6B35)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'SPLIT A / B / C'),
    h('p',null,'Programme de musculation personnalisé. Entre ton prénom pour commencer.'),
    inp,
    h('button',{onClick:()=>{
      const n=inp.value.trim();if(!n){inp.style.borderColor='#FF6B6B';return;}
      profile={name:n};sv('profile',profile);
      sessions=JSON.parse(JSON.stringify(DEF));sv('sessions',sessions);
      state={tab:'A',checked:{},logs:{}};sv('tab','A');sv('checked',{});sv('logs',{});
      render();
    }},'C\'est parti 💪')
  ));
  setTimeout(()=>inp.focus(),100);
}

function renderSession(sk){
  const s=sessions[sk];
  const allIds=s.groups.flatMap(g=>g.items.map(i=>i.id));
  const done=allIds.filter(id=>state.checked[id]).length;
  const tot=allIds.length,pct=tot?Math.round(done/tot*100):0,c=s.color;

  // Header + buttons
  const btnRow=h('div',{cls:'btn-row'});
  btnRow.append(h('button',{cls:'btn-s',css:{background:c+'08',color:c,border:'1px solid '+c+'30'},onClick:()=>{
    allIds.forEach(id=>{state.checked[id]=false});sv('checked',state.checked);render();
  }},'↻ Reset'));

  if(!editMode){
    btnRow.append(h('button',{cls:'btn-s',css:{background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)',border:'1px solid rgba(255,255,255,.1)'},onClick:()=>{editMode=true;render();}},'✏️ Éditer'));
    btnRow.append(h('button',{cls:'btn-s',css:{background:'rgba(255,100,100,.05)',color:'rgba(255,100,100,.5)',border:'1px solid rgba(255,100,100,.15)'},onClick:()=>{
      if(confirm('Réinitialiser séance '+sk+' par défaut ?')){
      const savedW={};
      sessions[sk].groups.forEach(g=>g.items.forEach(i=>{savedW[i.id]=i.weight}));
      sessions[sk]=JSON.parse(JSON.stringify(DEF[sk]));
      sessions[sk].groups.forEach(g=>g.items.forEach(i=>{if(savedW[i.id]!==undefined)i.weight=savedW[i.id]}));
      sv('sessions',sessions);render();
    }
    }},'↺ Défaut'));
  }

  app.append(h('div',{cls:'session-header',css:{background:'linear-gradient(135deg,'+c+'0D,transparent)',border:'1px solid '+c+'18'}},
    h('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
      h('div',null,h('h2',{cls:'syne',css:{fontWeight:'700',fontSize:'17px',color:c,marginBottom:'2px'}},s.title),h('span',{css:{fontSize:'12.5px',color:'rgba(255,255,255,.35)'}},s.subtitle)),
      h('div',{css:{textAlign:'right'}},h('div',{cls:'mono',css:{fontSize:'11px',color:'rgba(255,255,255,.2)'}},s.day),h('div',{cls:'mono',css:{fontSize:'13px',color:c,fontWeight:'600',marginTop:'2px'}},s.duration))
    ),btnRow
  ));

  // Progress
  app.append(h('div',{cls:'progress-wrap'},
    h('div',{css:{display:'flex',justifyContent:'space-between',marginBottom:'8px'}},
      h('span',{cls:'mono',css:{fontSize:'12px',color:'rgba(255,255,255,.3)'}},'Progression'),
      h('span',{cls:'mono',css:{fontSize:'12px',fontWeight:'600',color:c}},done+'/'+tot+' — '+pct+'%')
    ),
    h('div',{cls:'progress-bar'},h('div',{cls:'progress-fill',css:{width:pct+'%',background:c}}))
  ));

  // Groups
  s.groups.forEach((g,gi)=>{
    const gd=h('div',{cls:'group'});
    gd.append(h('div',{cls:'group-header'},h('span',{css:{fontSize:'16px'}},g.icon),h('span',{cls:'syne',css:{fontWeight:'700',fontSize:'11.5px',letterSpacing:'2.5px',color:c,textTransform:'uppercase'}},g.group)));

    g.items.forEach((item,ii)=>gd.append(mkExo(item,c,sk,gi,ii)));

    // Show pending adds for this group
    pendingAdd.filter(p=>p.sk===sk&&p.gi===gi).forEach(pa=>{
      gd.append(mkPendingExo(pa.item,c));
    });

    if(editMode)gd.append(h('button',{cls:'btn-add',onClick:()=>showAddModal(sk,gi,c)},'＋ Ajouter un exercice'));
    app.append(gd);
  });
}

function mkExo(item,color,sk,gi,ii){
  const done=!!state.checked[item.id];
  const isDel=pendingDel.has(item.id);
  const w=item.weight,showW=item.unit==='kg'&&w>0;

  let cls='exo';
  if(isDel)cls+=' marked-del';
  else if(done)cls+=' done';

  const card=h('div',{cls});
  card.append(h('div',{cls:'exo-bar',css:{background:isDel?'#FF6B6B':color}}));

  // Edit mode: delete/undo button
  if(editMode){
    if(isDel){
      card.append(h('button',{cls:'exo-del undo',onClick:e=>{e.stopPropagation();pendingDel.delete(item.id);render();}},'↩'));
    }else{
      card.append(h('button',{cls:'exo-del del',onClick:e=>{e.stopPropagation();pendingDel.add(item.id);render();}},'×'));
    }
  }

  // Checkbox (disabled in edit mode)
  if(!editMode){
    const chk=h('div',{cls:'exo-check',css:{background:done?color+'22':'transparent',borderColor:done?color:'rgba(255,255,255,.2)'},onClick:()=>{
      state.checked[item.id]=!state.checked[item.id];sv('checked',state.checked);render();
    }});
    if(done)chk.append(h('span',{css:{color,fontSize:'14px',fontWeight:'700'}},'✓'));
    card.append(chk);
  }

  const body=h('div',{css:{flex:'1',minWidth:'0',paddingRight:editMode?'32px':'0'}});
  body.append(h('div',{cls:'exo-name',css:{color:isDel?'rgba(255,100,100,.5)':'#F0EDE6'}},item.name));

  const tags=h('div',{cls:'tags'});
  tags.append(tg(item.sets,isDel?'#666':color));
  if(showW&&!isDel){
    tags.append(h('span',{cls:'tag mono',css:{color:'#FFD166',background:'#FFD16615',border:'1px solid #FFD16630',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:e=>{e.stopPropagation();showWeightModal(item,color)}},w+' kg ',h('span',{css:{fontSize:'9px',opacity:'.6'}},'✏️')));
  }else if(showW&&isDel){
    tags.append(tg(w+' kg','#666'));
  }else if(item.unit&&item.unit!=='kg'&&item.unit!==''){
    tags.append(tg(item.unit.toUpperCase(),isDel?'#555':'#888'));
  }
  if(item.rest)tags.append(tg('⏱ '+item.rest,isDel?'#444':'#555'));
  body.append(tags);

  if(item.note&&!isDel)body.append(h('p',{cls:'exo-note'},item.note));
  if(isDel)body.append(h('p',{css:{fontSize:'11.5px',color:'rgba(255,100,100,.4)',marginTop:'4px',fontStyle:'italic'}},'Sera supprimé à la validation'));
  if(item.prog&&!isDel)body.append(h('div',{css:{marginTop:'8px',padding:'7px 10px',borderRadius:'7px',background:color+'12',border:'1px solid '+color+'25',color,fontSize:'11.5px',fontWeight:'600'}},'📈 Note tes reps pour suivre ta progression'));

  card.append(body);return card;
}

function mkPendingExo(item,color){
  const card=h('div',{cls:'exo marked-add'});
  const body=h('div',{css:{flex:'1',minWidth:'0',paddingLeft:'4px'}});
  body.append(h('div',{css:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'7px'}},
    h('span',{css:{fontSize:'11px',padding:'2px 6px',borderRadius:'4px',background:'rgba(0,212,170,.12)',color:'#00D4AA',fontWeight:'600'}},'NOUVEAU'),
    h('span',{cls:'exo-name',css:{color:'#F0EDE6',marginBottom:'0'}},item.name)
  ));
  const tags=h('div',{cls:'tags'});
  tags.append(tg(item.sets,color));
  if(item.unit==='kg'&&item.weight>0)tags.append(tg(item.weight+' kg','#9E9E9E'));
  else if(item.unit&&item.unit!=='kg'&&item.unit!=='')tags.append(tg(item.unit.toUpperCase(),'#888'));
  if(item.rest)tags.append(tg('⏱ '+item.rest,'#555'));
  body.append(tags);
  if(item.note)body.append(h('p',{cls:'exo-note'},item.note));
  body.append(h('p',{css:{fontSize:'11.5px',color:'rgba(0,212,170,.4)',marginTop:'4px',fontStyle:'italic'}},'Sera ajouté à la validation'));
  card.append(body);
  // Remove from pending
  card.append(h('button',{cls:'exo-del del',onClick:e=>{
    e.stopPropagation();
    const idx=pendingAdd.findIndex(p=>p.item.id===item.id);
    if(idx>=0)pendingAdd.splice(idx,1);
    render();
  }},'×'));
  return card;
}

function renderLog(){
  app.append(h('div',{css:{padding:'16px',borderRadius:'12px',marginBottom:'16px',border:'1px solid rgba(255,209,102,.15)',background:'linear-gradient(135deg,rgba(255,209,102,.08),transparent)'}},
    h('p',{css:{fontSize:'13px',color:'rgba(255,255,255,.45)',lineHeight:'1.5'}},'Chaque modification de poids via ✏️ est enregistrée ici.')
  ));
  let any=false;
  Object.entries(sessions).forEach(([sk,session])=>{
    session.groups.forEach(group=>{
      group.items.forEach(item=>{
        const logs=state.logs[item.id];if(!logs||!logs.length)return;any=true;
        const card=h('div',{cls:'log-card'});
        card.append(h('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
          h('span',{css:{fontWeight:'600',fontSize:'14px',color:'#F0EDE6'}},item.name),
          h('span',{cls:'mono',css:{fontSize:'13px',fontWeight:'700',color:session.color}},item.weight>0?item.weight+' kg':'PDC')
        ));
        logs.slice(-8).reverse().forEach(log=>{
          const tc=log.to>log.from?'#00D4AA':log.to<log.from?'#FF6B6B':'rgba(255,255,255,.4)';
          const ar=log.to>log.from?' ↑':log.to<log.from?' ↓':'';
          const row=h('div',{cls:'log-entry mono'});
          row.append(h('span',{css:{color:'rgba(255,255,255,.3)'}},log.date));
          const vs=h('span',{css:{color:'rgba(255,255,255,.5)'}});vs.append(t(log.from+' → '));
          vs.append(h('span',{css:{color:tc,fontWeight:'600'}},log.to+' kg'+ar));
          row.append(vs);card.append(row);
        });
        app.append(card);
      });
    });
  });
  // Also show logs for deleted exercises (kept via exoNames)
  const shownIds=new Set();
  Object.values(sessions).forEach(s=>s.groups.forEach(g=>g.items.forEach(i=>shownIds.add(i.id))));
  Object.entries(state.logs).forEach(([id,logs])=>{
    if(shownIds.has(id)||!logs||!logs.length)return;
    const info=state.exoNames[id];if(!info)return;
    any=true;
    const card=h('div',{cls:'log-card',css:{opacity:'.65',borderColor:'rgba(255,255,255,.04)'}});
    card.append(h('div',{css:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      h('span',{css:{fontWeight:'600',fontSize:'14px',color:'rgba(255,255,255,.5)'}},info.name+' '),
      h('span',{css:{fontSize:'11px',color:'rgba(255,255,255,.2)',fontStyle:'italic'}},'exercice supprimé')
    ));
    logs.slice(-8).reverse().forEach(log=>{
      const tc=log.to>log.from?'#00D4AA':log.to<log.from?'#FF6B6B':'rgba(255,255,255,.4)';
      const ar=log.to>log.from?' ↑':log.to<log.from?' ↓':'';
      const row=h('div',{cls:'log-entry mono'});
      row.append(h('span',{css:{color:'rgba(255,255,255,.3)'}},log.date));
      const vs=h('span',{css:{color:'rgba(255,255,255,.4)'}});vs.append(t(log.from+' → '));
      vs.append(h('span',{css:{color:tc,fontWeight:'600'}},log.to+' kg'+ar));
      row.append(vs);card.append(row);
    });
    app.append(card);
  });
  if(!any)app.append(h('p',{css:{textAlign:'center',color:'rgba(255,255,255,.2)',fontSize:'13px',padding:'20px'}},'Aucun changement de poids enregistré.'));
  if(any)app.append(h('button',{css:{marginTop:'12px',width:'100%',padding:'12px',borderRadius:'10px',border:'1px solid rgba(255,100,100,.2)',background:'rgba(255,100,100,.05)',color:'rgba(255,100,100,.6)',fontSize:'13px',fontWeight:'600',cursor:'pointer'},onClick:()=>{
    if(confirm("Effacer l'historique ?")){state.logs={};sv('logs',state.logs);render()}
  }},"Effacer l'historique"));
}

function renderTips(){
  TIPS.forEach(tip=>{
    app.append(h('div',{cls:'tip'},
      h('div',{css:{fontSize:'24px',lineHeight:'1',flexShrink:'0',marginTop:'2px'}},tip.icon),
      h('div',null,h('h4',{cls:'syne',css:{margin:'0 0 4px',fontWeight:'700',fontSize:'14.5px',color:'#F0EDE6'}},tip.title),
        h('p',{css:{margin:'0',fontSize:'13px',color:'rgba(255,255,255,.42)',lineHeight:'1.55'}},tip.text))
    ));
  });
}

render();
